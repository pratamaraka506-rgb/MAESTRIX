<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MAESTRIX | Business Automation & AI Solutions</title>

  <link rel="icon" type="image/png" href="./maestrix.png" />
  <link rel="apple-touch-icon" href="./maestrix.png" />

  <meta
    name="description"
    content="MAESTRIX - Business Automation, AI Solutions, Enterprise Dashboard, Retail Intelligence, Partnership Management, and Digital Innovation Platform."
  />

  <meta name="theme-color" content="#08111f" />
  <meta property="og:title" content="MAESTRIX" />
  <meta property="og:description" content="Business Automation, Enterprise Dashboard, AI Solutions, and Digital Innovation Platform." />
  <meta property="og:image" content="./maestrix.png" />
  <meta property="og:type" content="website" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#08111f;
      font-family:Arial, Helvetica, sans-serif;
    }

    iframe{
      width:100%;
      height:100vh;
      border:none;
      display:block;
      background:#08111f;
    }

    .loading{
      position:fixed;
      inset:0;
      background:radial-gradient(circle at top right,#163d74 0%,#08111f 45%,#02060d 100%);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:18px;
      z-index:9999;
      transition:opacity .5s ease;
      text-align:center;
      padding:24px;
    }

    .loading.hide{
      opacity:0;
      pointer-events:none;
    }

    .logo{
      width:110px;
      height:110px;
      border-radius:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#1ea7ff,#0f2f5f);
      color:white;
      font-size:42px;
      font-weight:800;
      letter-spacing:2px;
      box-shadow:0 0 35px rgba(30,167,255,.35);
    }

    .brand{
      font-size:12px;
      letter-spacing:4px;
      color:#8bc8ff;
      text-transform:uppercase;
      font-weight:600;
    }

    h1{
      font-size:36px;
      color:#1ea7ff;
      letter-spacing:2px;
      font-weight:800;
    }

    p{
      color:#d8ecff;
      font-size:14px;
      opacity:.9;
      line-height:1.6;
    }

    .spinner{
      width:44px;
      height:44px;
      border:4px solid rgba(255,255,255,.15);
      border-top:4px solid #1ea7ff;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    .footer{
      position:fixed;
      bottom:18px;
      left:0;
      width:100%;
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,.45);
      z-index:10000;
      letter-spacing:1px;
    }

    @keyframes spin{
      100%{transform:rotate(360deg)}
    }
  </style>
</head>

<body>

  <div class="loading" id="loading">
    <div class="logo">MX</div>

    <span class="brand">DIGITAL INNOVATION PLATFORM</span>

    <h1>MAESTRIX</h1>

    <p>
      Business Automation • AI Solutions • Enterprise Dashboard
      <br />
      Loading system...
    </p>

    <div class="spinner"></div>
  </div>

  <iframe
    src="1o2deZc6TzkaBBY1stnJt5p7FzMQ0GNBZUTEBFsbXdnUQ48OS3JYVKmBY"
    title="MAESTRIX Dashboard"
    onload="document.getElementById('loading').classList.add('hide')">
  </iframe>

  <div class="footer">
    © 2026 MAESTRIX • Business Automation & AI Solutions
  </div>

</body>
</html>
