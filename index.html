<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MAESTRIX | HRIS Dashboard</title>
  <meta name="description" content="MAESTRIX HRIS Enterprise Dashboard" />
  <meta name="theme-color" content="#08111f" />

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{
      min-height:100vh;
      background:radial-gradient(circle at top right,#163d74,#08111f 45%,#02060d);
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:24px;
    }
    .box{max-width:680px}
    .logo{
      width:110px;height:110px;margin:0 auto 22px;
      border-radius:26px;
      background:linear-gradient(135deg,#1ea7ff,#0f2f5f);
      display:flex;align-items:center;justify-content:center;
      font-size:42px;font-weight:800;
      box-shadow:0 0 35px rgba(30,167,255,.35);
    }
    .brand{
      font-size:12px;
      letter-spacing:4px;
      color:#8bc8ff;
      text-transform:uppercase;
      font-weight:700;
      margin-bottom:14px;
    }
    h1{font-size:38px;color:#1ea7ff;margin-bottom:12px}
    p{color:#d8ecff;line-height:1.7;margin-bottom:24px}
    .btn{
      display:inline-block;
      padding:13px 22px;
      background:#1ea7ff;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-weight:700;
      border:none;
      cursor:pointer;
    }
    .small{font-size:12px;color:rgba(255,255,255,.55);margin-top:16px}
    .footer{
      position:fixed;
      bottom:18px;
      left:0;
      width:100%;
      font-size:12px;
      color:rgba(255,255,255,.45);
    }
  </style>
</head>

<body>
  <main class="box">
    <div class="logo">MX</div>
    <div class="brand">Digital Innovation Platform</div>
    <h1>MAESTRIX</h1>

    <p>
      Business Automation • AI Solutions • Enterprise Dashboard<br>
      Mengalihkan ke HRIS Dashboard...
    </p>

    <a id="openBtn" class="btn" href="#" rel="noopener noreferrer">
      Open Dashboard
    </a>

    <div class="small">
      Jika tidak otomatis terbuka, klik tombol di atas.
    </div>
  </main>

  <div class="footer">
    © 2026 MAESTRIX • Business Automation & AI Solutions
  </div>

  <script>
    const WEB_APP_URL =
      "https://script.google.com/macros/s/AKfycbwRPQRk1VdzVNGN7jwukvg3KLW8P_yEWS24DROzaCR42opF_xakEUDDwmNkzKpA9CLE/exec";

    function isValidAppsScriptUrl(url) {
      return /^https:\/\/script\.google\.com\/macros\/s\/[^/]+\/exec(\?.*)?$/.test(url);
    }

    const openBtn = document.getElementById("openBtn");

    if (!isValidAppsScriptUrl(WEB_APP_URL)) {
      document.querySelector("p").innerHTML =
        "URL Apps Script tidak valid.<br>Pastikan memakai format https://script.google.com/macros/s/DEPLOYMENT_ID/exec";
      openBtn.style.display = "none";
    } else {
      openBtn.href = WEB_APP_URL;

      setTimeout(function () {
        window.location.replace(WEB_APP_URL + "?v=" + Date.now());
      }, 900);
    }
  </script>
</body>
</html>
