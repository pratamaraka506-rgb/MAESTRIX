<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MAESTRIX | HRIS Dashboard</title>
  <meta name="description" content="MAESTRIX HRIS Enterprise Dashboard" />
  <meta name="theme-color" content="#08111f" />

  <!-- Upload favicon.png ke root repository GitHub -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08111f;
      font-family: Arial, Helvetica, sans-serif;
    }

    .loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      background: radial-gradient(circle at top right, #163d74, #08111f 45%, #02060d);
      color: #d8ecff;
      z-index: 1;
      text-align: center;
      padding: 24px;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(135deg, #1ea7ff, #14b8a6);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      box-shadow: 0 0 35px rgba(30, 167, 255, .35);
    }

    .loading strong {
      color: #ffffff;
      font-size: 18px;
      letter-spacing: .02em;
    }

    .loading span {
      color: #8bc8ff;
      font-size: 13px;
    }

    iframe {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #08111f;
    }
  </style>
</head>

<body>
  <div class="loading" id="loading">
    <div class="logo">MX</div>
    <strong>Loading MAESTRIX HRIS Dashboard...</strong>
    <span>Business Automation & AI Solutions</span>
  </div>

  <!--
    PENTING:
    Ini iframe, bukan redirect.
    Jangan tambahkan window.location.href / window.location.replace.
    Dengan cara ini address bar tetap maestrix.vercel.app.
  -->
  <iframe
    src="https://script.google.com/macros/s/AKfycbwRPQRk1VdzVNGN7jwukvg3KLW8P_yEWS24DROzaCR42opF_xakEUDDwmNkzKpA9CLE/exec"
    title="MAESTRIX HRIS Dashboard"
    allow="camera; microphone; clipboard-read; clipboard-write; fullscreen"
    referrerpolicy="no-referrer-when-downgrade"
    onload="document.getElementById('loading').style.display='none';">
  </iframe>
</body>
</html>
